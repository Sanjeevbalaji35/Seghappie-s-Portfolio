<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanjeev Balaji | Ideas, Works & Venture Space</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .content-tab { display: none; }
    .content-tab.active { display: block; }
    body.admin-mode .editable-field { outline: 2px dashed #10B981 !important; background-color: rgba(240, 253, 250, 0.5); padding: 4px; border-radius: 8px; cursor: text; }
    .save-indicator { display: none; }
    body.admin-mode .save-indicator { display: block; }
    body.admin-mode .admin-action-btn { display: inline-flex !important; }
  </style>
</head>
<body class="bg-[#FAFAF9] text-[#1C1917] min-h-screen">

  <div class="save-indicator bg-emerald-600 text-white py-3 px-6 text-center sticky top-0 z-50 shadow-md">
    <div class="max-w-3xl mx-auto flex justify-between items-center">
      <span class="text-[10px] font-bold uppercase tracking-wider">🛠️ Editing Terminal Active</span>
      <button onclick="executeSaveAction()" class="bg-white text-emerald-700 font-extrabold text-[10px] uppercase tracking-widest px-4 py-2 rounded-lg hover:bg-stone-50">Save Changes</button>
    </div>
  </div>

  <nav class="max-w-3xl mx-auto px-6 py-12 flex justify-between items-center">
    <span class="text-[10px] font-black tracking-[0.2em] text-stone-400 uppercase">SYS // CONTROL</span>
    <div class="flex gap-1">
      <button onclick="switchTab('bio')" id="tab-btn-bio" class="portfolio-nav-btn px-3 py-1 rounded-lg font-bold text-[10px] uppercase tracking-widest text-stone-900 bg-stone-200/50">Profile</button>
      <button onclick="switchTab('story')" id="tab-btn-story" class="portfolio-nav-btn px-3 py-1 rounded-lg font-bold text-[10px] uppercase tracking-widest text-stone-500 hover:text-stone-900">Story</button>
      <button onclick="switchTab('books')" id="tab-btn-books" class="portfolio-nav-btn px-3 py-1 rounded-lg font-bold text-[10px] uppercase tracking-widest text-stone-500 hover:text-stone-900">Books</button>
      <button onclick="switchTab('career')" id="tab-btn-career" class="portfolio-nav-btn px-3 py-1 rounded-lg font-bold text-[10px] uppercase tracking-widest text-stone-500 hover:text-stone-900">Career</button>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-6 pb-20">
    <section id="tab-bio" class="content-tab active space-y-12">
      <h1 id="intro-headline" class="editable-field text-5xl font-black tracking-tight text-stone-900 uppercase">Ideas. Works. <br/>Career. Blogs.</h1>
      <div id="profile-links-container" class="flex flex-wrap gap-3"></div>
      <button onclick="createNewProfileLinkCard()" class="hidden admin-action-btn bg-stone-900 text-white text-[10px] font-black px-4 py-2 rounded-lg uppercase tracking-wider">＋ Add Link</button>
    </section>

    <section id="tab-story" class="content-tab space-y-12">
      <div class="flex justify-between items-center">
        <h2 class="text-xl font-black uppercase">Journey Archive</h2>
        <button onclick="createNewVentureLog()" class="hidden admin-action-btn bg-stone-900 text-white text-[10px] px-3 py-1 rounded-lg">＋ Add Log</button>
      </div>
      <div id="timeline-stack" class="space-y-8"></div>
    </section>

    <section id="tab-books" class="content-tab space-y-12">
      <h2 class="text-xl font-black uppercase">Manuscripts</h2>
      <div id="book-stack" class="space-y-6"></div>
    </section>

    <section id="tab-career" class="content-tab space-y-12">
      <h2 class="text-xl font-black uppercase">Career Log</h2>
      <div id="career-stack" class="space-y-6"></div>
    </section>
  </main>

  <footer class="max-w-3xl mx-auto px-6 py-12 border-t border-stone-200">
    <input type="password" id="inline-pass-field" placeholder="Terminal Override" class="px-3 py-2 bg-stone-100 border border-stone-200 rounded-lg text-[10px] w-32">
    <button onclick="executeInlineOverride()" class="bg-stone-900 text-white text-[10px] px-3 py-2 rounded-lg font-black uppercase">Unlock</button>
  </footer>

  <script>
    // Data Setup
    const defaultProfileLinks = [{ id: "lnk-1", label: "AKKU SYSTEMS", url: "https://akkucustomfurniture.vercel.app/" }];
    const defaultTimelineData = [{ id: "log-1", marker: "Log #01", title: "Venture Started", body: "Initial deployment." }];
    
    function switchTab(target) {
      document.querySelectorAll('.content-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + target).classList.add('active');
    }

    function renderProfileLinkStack() {
      const container = document.getElementById("profile-links-container"); container.innerHTML = "";
      const data = localStorage.getItem("profile-links-matrix-list") ? JSON.parse(localStorage.getItem("profile-links-matrix-list")) : defaultProfileLinks;
      data.forEach(item => {
        const a = document.createElement("a");
        a.href = item.url; a.className = "text-stone-900 font-bold text-xs uppercase border border-stone-200 px-4 py-2 rounded-xl hover:bg-stone-100";
        a.innerText = item.label; container.appendChild(a);
      });
    }

    function executeInlineOverride() {
      if(document.getElementById("inline-pass-field").value === "akku2026") {
        document.body.classList.add('admin-mode');
        document.querySelectorAll('.editable-field').forEach(el => el.contentEditable = "true");
      }
    }

    function executeSaveAction() {
      localStorage.setItem("intro-headline", document.getElementById("intro-headline").innerText);
      alert("Changes saved."); window.location.reload();
    }

    document.addEventListener("DOMContentLoaded", () => {
      if(localStorage.getItem("intro-headline")) document.getElementById("intro-headline").innerText = localStorage.getItem("intro-headline");
      renderProfileLinkStack();
    });

    function createNewProfileLinkCard() { alert("Use Admin mode to add links."); }
    function createNewVentureLog() { alert("Use Admin mode to add logs."); }
  </script>
</body>
</html>
